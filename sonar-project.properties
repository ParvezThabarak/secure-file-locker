# SonarQube Project Configuration for VaultOS
# ─────────────────────────────────────────────
sonar.projectKey=vaultos-secure-file-locker
sonar.projectName=VaultOS - Secure File Locker
sonar.projectVersion=3.0

# Source directories
sonar.sources=app,ml_engine,aws_integration
sonar.tests=tests

# Language
sonar.language=py
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/__pycache__/**,**/venv/**,**/node_modules/**,**/*.pyc,uploads/**,ml_engine/models/**,terraform/**

# Python coverage report (from pytest-cov)
sonar.python.coverage.reportPaths=reports/coverage.xml

# Quality thresholds
sonar.qualitygate.wait=true
