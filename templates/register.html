{% extends "base.html" %}
{% block title %}Register — VaultOS{% endblock %}
{% block extra_style %}
<style>
.auth-wrap{max-width:440px;margin:3rem auto}
.auth-logo{text-align:center;margin-bottom:2rem}
.alt-link{text-align:center;margin-top:1.25rem;font-size:0.88rem;color:var(--muted)}
.alt-link a{color:var(--accent);text-decoration:none}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-logo">
    <div style="font-size:2.5rem;margin-bottom:0.5rem">🛡️</div>
    <h2 style="font-size:1.5rem;font-weight:700">Create Your Vault</h2>
    <p style="color:var(--muted);font-size:0.88rem;margin-top:4px">Encrypted. Private. Secure.</p>
  </div>
  <div class="card"><div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="choose_a_username"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="your@email.com"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="Min 8 chars"/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" required placeholder="Repeat"/>
        </div>
      </div>
      <button type="submit" class="btn btn-purple" style="width:100%;justify-content:center;padding:11px">
        🛡️ Create Vault
      </button>
    </form>
  </div></div>
  <div class="alt-link">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></div>
</div>
{% endblock %}
