{% extends "base.html" %}
{% block title %}Reset Password — VaultOS{% endblock %}
{% block extra_style %}
<style>
.auth-wrap{max-width:420px;margin:4rem auto}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-logo .logo-ring{
  width:70px;height:70px;border-radius:50%;margin:0 auto 1rem;
  background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(99,179,237,0.2));
  border:1px solid rgba(16,185,129,0.3);display:flex;align-items:center;justify-content:center;font-size:2rem;
}
.auth-logo h1{font-size:1.4rem;font-weight:700}
.auth-logo p{color:var(--muted);font-size:0.86rem;margin-top:4px}
.user-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(99,179,237,0.1);
  border:1px solid rgba(99,179,237,0.2);border-radius:20px;padding:4px 14px;
  font-family:var(--mono);font-size:0.85rem;color:var(--accent);margin-top:8px}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="logo-ring">🔓</div>
    <h1>Reset Password</h1>
    <p>Set a new password for your account</p>
    <div class="user-badge">👤 {{ username }}</div>
  </div>
  <div class="card"><div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" required autofocus placeholder="At least 8 characters"/>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" required placeholder="Re-enter your new password"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px">
        ✅ Reset Password
      </button>
    </form>
  </div></div>
</div>
{% endblock %}
