{% extends "base.html" %}
{% block title %}Login — VaultOS{% endblock %}
{% block extra_style %}
<style>
.auth-wrap{max-width:420px;margin:4rem auto}
.auth-logo{text-align:center;margin-bottom:2rem}
.auth-logo .logo-ring{
  width:70px;height:70px;border-radius:50%;margin:0 auto 1rem;
  background:linear-gradient(135deg,rgba(99,179,237,0.2),rgba(124,58,237,0.2));
  border:1px solid rgba(99,179,237,0.3);display:flex;align-items:center;justify-content:center;font-size:2rem;
}
.auth-logo h1{font-size:1.6rem;font-weight:700;letter-spacing:1px}
.auth-logo p{color:var(--muted);font-size:0.88rem;margin-top:4px}
.divider-or{text-align:center;color:var(--muted);font-size:0.8rem;margin:1rem 0;position:relative}
.divider-or::before,.divider-or::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.divider-or::before{left:0}.divider-or::after{right:0}
.alt-link{text-align:center;margin-top:1.25rem;font-size:0.88rem;color:var(--muted)}
.alt-link a{color:var(--accent);text-decoration:none}
.forgot-link{text-align:right;margin-top:-0.5rem;margin-bottom:1.25rem}
.forgot-link a{color:var(--muted);font-size:0.82rem;text-decoration:none;transition:color 0.2s}
.forgot-link a:hover{color:var(--accent)}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="logo-ring">🔐</div>
    <h1>VaultOS</h1>
    <p>Secure. Encrypted. Yours.</p>
  </div>
  <div class="card"><div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus placeholder="your_username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••"/>
      </div>
      <div class="forgot-link">
        <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.25rem">
        <input type="checkbox" name="remember" id="rem" style="width:auto"/>
        <label for="rem" style="text-transform:none;font-size:0.84rem;letter-spacing:0;color:var(--muted)">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px">
        🔓 Access Vault
      </button>
    </form>
  </div></div>
  <div class="alt-link">No account? <a href="{{ url_for('auth.register') }}">Create one</a></div>
</div>
{% endblock %}
